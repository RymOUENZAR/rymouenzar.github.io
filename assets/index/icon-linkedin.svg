<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="g-li" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f0c85a"/>
      <stop offset="60%"  stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi (style LinkedIn) -->
  <rect x="2.5" y="2.5" width="19" height="19" rx="3.5"
        stroke="url(#g-li)" stroke-width="1.3"
        fill="rgba(212,168,67,0.05)"/>

  <!-- "in" typographique — trait vertical gauche -->
  <line x1="7.5" y1="10" x2="7.5" y2="17"
        stroke="url(#g-li)" stroke-width="2" stroke-linecap="round"/>

  <!-- Point en haut du i -->
  <circle cx="7.5" cy="7.5" r="1.1" fill="#d4a843"/>

  <!-- Jambe droite du n (verticale) -->
  <line x1="16.5" y1="13.5" x2="16.5" y2="17"
        stroke="url(#g-li)" stroke-width="2" stroke-linecap="round"/>

  <!-- Arc du n -->
  <path d="M7.5 13.5C7.5 11 9 10 11 10s3.5 1 3.5 3.5"
        stroke="url(#g-li)" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- Jambe intérieure du n (montante) -->
  <line x1="11" y1="10" x2="11" y2="17"
        stroke="url(#g-li)" stroke-width="2" stroke-linecap="round"/>

  <!-- Coins ornementaux (marque DA) -->
  <path d="M2.5 2.5l1.2 1.2" stroke="#b8860b" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <path d="M21.5 21.5l-1.2-1.2" stroke="#b8860b" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <path d="M21.5 2.5l-1.2 1.2" stroke="#b8860b" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <path d="M2.5 21.5l1.2-1.2" stroke="#b8860b" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
</svg>
