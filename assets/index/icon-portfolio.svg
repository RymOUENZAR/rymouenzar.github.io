<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="g-pf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f0c85a"/>
      <stop offset="60%"  stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Globe principal -->
  <circle cx="12" cy="12" r="9.3"
          stroke="url(#g-pf)" stroke-width="1.3"
          fill="rgba(212,168,67,0.04)"/>

  <!-- Méridien vertical -->
  <ellipse cx="12" cy="12" rx="4" ry="9.3"
           stroke="#d4a843" stroke-width="1" opacity="0.6" fill="none"/>

  <!-- Parallèles (latitudes) -->
  <path d="M2.8 9h18.4" stroke="#d4a843" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <path d="M2.8 15h18.4" stroke="#d4a843" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>

  <!-- Axe vertical (pôles) -->
  <line x1="12" y1="2.7" x2="12" y2="21.3"
        stroke="#b8860b" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <!-- Marque aux pôles -->
  <circle cx="12" cy="2.7"  r="1"   fill="#d4a843" opacity="0.7"/>
  <circle cx="12" cy="21.3" r="1"   fill="#d4a843" opacity="0.7"/>

  <!-- Rose des vents (centre) — petite croix ornementale -->
  <path d="M12 10.5v3M10.5 12h3"
        stroke="#f0c85a" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>

  <!-- Losange central -->
  <path d="M12 11.1l.9.9-.9.9-.9-.9Z" fill="#d4a843" opacity="0.4"/>

  <!-- Petits tirets aux 4 cardinaux du cercle extérieur -->
  <line x1="12"  y1="2"   x2="12"  y2="3.2"  stroke="#b8860b" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
  <line x1="12"  y1="20.8" x2="12" y2="22"   stroke="#b8860b" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
  <line x1="2"   y1="12"  x2="3.2" y2="12"   stroke="#b8860b" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
  <line x1="20.8" y1="12" x2="22" y2="12"    stroke="#b8860b" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
</svg>
