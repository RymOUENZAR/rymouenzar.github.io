<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="g-mail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f0c85a"/>
      <stop offset="60%"  stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Enveloppe -->
  <rect x="3" y="5.5" width="18" height="13" rx="1.5"
        stroke="url(#g-mail)" stroke-width="1.3"
        fill="rgba(212,168,67,0.05)"/>

  <!-- Rabat supérieur (V) -->
  <path d="M3 7l9 7 9-7"
        stroke="url(#g-mail)" stroke-width="1.3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ligne de pli basse -->
  <line x1="3" y1="18.5" x2="9.5" y2="13.5"
        stroke="#b8860b" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <line x1="21" y1="18.5" x2="14.5" y2="13.5"
        stroke="#b8860b" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>

  <!-- Petit losange au centre (ornement de sceau) -->
  <path d="M12 11.8l.9-.6.9.6-.9.6Z"
        fill="#d4a843" opacity="0.35"/>

  <!-- Coins ornementaux -->
  <path d="M3 5.5l.7.7" stroke="#b8860b" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <path d="M21 5.5l-.7.7" stroke="#b8860b" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
</svg>
